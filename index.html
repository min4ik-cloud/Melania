<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melania Page</title>
<style>
    body {
        font-family: 'Comic Sans MS', cursive, sans-serif;
        background: linear-gradient(to bottom, #ffe6f0, #fff0f5);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
    }

    h1 {
        color: #ff66b2;
        font-size: 3rem;
        margin-bottom: 20px;
        text-shadow: 1px 1px 2px #ff99cc;
    }

    button {
        background-color: #ff99cc;
        border: none;
        color: white;
        padding: 12px 24px;
        font-size: 1.2rem;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        transition: 0.3s;
    }

    button:hover {
        background-color: #ff66b2;
        transform: scale(1.1);
    }

    #message {
        margin-top: 20px;
        font-size: 1.5rem;
        color: #cc3399;
    }
</style>
</head>
<body>

<h1>Melania 💖</h1>
<button onclick="sayHello()">Click me!</button>
<div id="message"></div>

<script>
function sayHello() {
    const messages = [
        "Hi! You're amazing today! 🌸",
        "Keep smiling, Melania! 💕",
        "You are strong and beautiful! 🌷",
        "Shine bright like a star! ✨"
    ];
    const randomIndex = Math.floor(Math.random() * messages.length);
    document.getElementById('message').innerText = messages[randomIndex];
}
</script>

</body>
</html>
